<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta Performance - Daily Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        body { background-color: #f8fafc; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const Icon = ({ name, className = "w-6 h-6", color = "currentColor" }) => {
            const [svgContent, setSvgContent] = useState('');

            useEffect(() => {
                const timer = setTimeout(() => {
                    if (window.lucide && window.lucide.icons) {
                        const iconData = window.lucide.icons[name];
                        if (iconData) {
                            const [tag, attrs, children] = iconData;
                            const childrenSvg = children.map(([childTag, childAttrs]) => {
                                const attrString = Object.entries(childAttrs)
                                    .map(([k, v]) => `${k}="${v}"`)
                                    .join(' ');
                                return `<${childTag} ${attrString} />`;
                            }).join('');

                            const rootAttrs = Object.entries({
                                ...attrs,
                                class: className,
                                stroke: color,
                                "stroke-width": "2",
                                "stroke-linecap": "round",
                                "stroke-linejoin": "round",
                                fill: "none"
                            }).map(([k, v]) => `${k}="${v}"`).join(' ');

                            setSvgContent(`<svg ${rootAttrs}>${childrenSvg}</svg>`);
                        }
                    }
                }, 10);
                return () => clearTimeout(timer);
            }, [name, className, color]);

            if (!svgContent) return <div className={`${className} bg-slate-200 animate-pulse rounded`}></div>;
            return <span className="flex items-center justify-center" dangerouslySetInnerHTML={{ __html: svgContent }} />;
        };

        const WeeklyChart = ({ data }) => {
            const max = Math.max(...data.map(d => d.valor), 1);
            return (
                <div className="flex items-end justify-between h-32 gap-3 px-2 pt-4">
                    {data.map((d, i) => (
                        <div key={i} className="flex-1 flex flex-col items-center gap-2">
                            <div className="relative w-full group">
                                <div 
                                    className={`w-full rounded-t-lg transition-all duration-700 ease-in-out ${d.valor >= 80 ? 'bg-emerald-500' : d.valor >= 50 ? 'bg-indigo-500' : 'bg-slate-200'}`}
                                    style={{ height: `${(d.valor / max) * 100}%` }}
                                >
                                    <div className="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
                                        {d.valor}%
                                    </div>
                                </div>
                            </div>
                            <span className="text-[10px] text-slate-400 font-bold uppercase">{d.dia}</span>
                        </div>
                    ))}
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('home'); 
            const [activeTab, setActiveTab] = useState('agua');
            const [dailyData, setDailyData] = useState({
                agua: 0,
                metaAgua: 2500,
                refeicoes: [
                    { id: 1, label: 'Café da Manhã', completed: false },
                    { id: 2, label: 'Almoço Saudável', completed: false },
                    { id: 3, label: 'Lanche Nutritivo', completed: false },
                    { id: 4, label: 'Jantar Leve', completed: false }
                ],
                mente: { minutos: 0, leituras: false, meditacao: false },
                exercicio: { minutos: 0, tipo: 'Nenhum', treinou: false },
                historico: [
                    { dia: 'Seg', valor: 65 }, { dia: 'Ter', valor: 85 },
                    { dia: 'Qua', valor: 40 }, { dia: 'Qui', valor: 92 },
                    { dia: 'Sex', valor: 75 }, { dia: 'Sab', valor: 30 },
                    { dia: 'Dom', valor: 0 }
                ]
            });

            useEffect(() => {
                const saved = localStorage.getItem('altaPerformance_data');
                if (saved) try { setDailyData(JSON.parse(saved)); } catch (e) {}
            }, []);

            useEffect(() => {
                localStorage.setItem('altaPerformance_data', JSON.stringify(dailyData));
            }, [dailyData]);

            const progress = useMemo(() => {
                const aguaPct = Math.min((dailyData.agua / dailyData.metaAgua) * 100, 100);
                const refeicoesPct = (dailyData.refeicoes.filter(r => r.completed).length / dailyData.refeicoes.length) * 100;
                const mentePct = (dailyData.mente.minutos >= 15 ? 50 : (dailyData.mente.minutos / 15) * 50) + 
                                (dailyData.mente.meditacao ? 25 : 0) + (dailyData.mente.leituras ? 25 : 0);
                const exercicioPct = dailyData.exercicio.treinou ? 100 : Math.min((dailyData.exercicio.minutos / 45) * 100, 100);
                
                return Math.round((aguaPct + refeicoesPct + mentePct + exercicioPct) / 4);
            }, [dailyData]);

            const avgWeek = useMemo(() => {
                const total = dailyData.historico.reduce((acc, curr) => acc + curr.valor, 0);
                return Math.round(total / 7);
            }, [dailyData.historico]);

            const updateWater = (val) => setDailyData(prev => ({ ...prev, agua: Math.max(0, prev.agua + val) }));
            const toggleRefeicao = (id) => setDailyData(prev => ({
                ...prev, refeicoes: prev.refeicoes.map(r => r.id === id ? { ...r, completed: !r.completed } : r)
            }));
            const updateMente = (field, value) => setDailyData(prev => ({
                ...prev, mente: { ...prev.mente, [field]: value }
            }));
            const updateExercicio = (field, value) => setDailyData(prev => ({
                ...prev, exercicio: { ...prev.exercicio, [field]: value }
            }));

            const HomeView = () => (
                <div className="animate-fade-in space-y-6 pb-24">
                    <header className="flex justify-between items-start pt-4">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Olá, campeões.</h1>
                            <p className="text-slate-500 text-sm mt-1">Disciplina diária cria resultados extraordinários.</p>
                        </div>
                        <div className="bg-indigo-50 p-2.5 rounded-2xl shadow-sm">
                            <Icon name="zap" className="w-6 h-6" color="#4f46e5" />
                        </div>
                    </header>

                    {/* Dashboard de Progresso */}
                    <div className="bg-slate-900 rounded-3xl p-6 text-white shadow-2xl relative overflow-hidden">
                        <div className="relative z-10">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <span className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Score de Hoje</span>
                                    <h2 className="text-3xl font-black mt-1">{progress}%</h2>
                                </div>
                                <div className="text-right">
                                    <span className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Média Semanal</span>
                                    <h2 className="text-xl font-bold mt-1 text-emerald-400">{avgWeek}%</h2>
                                </div>
                            </div>
                            
                            <div className="w-full bg-white/10 rounded-full h-4 mb-8 p-1">
                                <div 
                                    className="h-full bg-gradient-to-r from-indigo-500 to-rose-400 rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(244,63,94,0.3)]" 
                                    style={{ width: `${progress}%` }} 
                                />
                            </div>

                            <div className="grid grid-cols-4 gap-2">
                                <div className="bg-white/5 p-2 rounded-xl backdrop-blur-sm">
                                    <p className="text-[8px] text-slate-400 font-bold uppercase mb-1 text-center">Água</p>
                                    <p className="text-sm font-bold text-blue-400 text-center">{Math.round((dailyData.agua/dailyData.metaAgua)*100)}%</p>
                                </div>
                                <div className="bg-white/5 p-2 rounded-xl backdrop-blur-sm">
                                    <p className="text-[8px] text-slate-400 font-bold uppercase mb-1 text-center">Dieta</p>
                                    <p className="text-sm font-bold text-emerald-400 text-center">{Math.round((dailyData.refeicoes.filter(r => r.completed).length/4)*100)}%</p>
                                </div>
                                <div className="bg-white/5 p-2 rounded-xl backdrop-blur-sm">
                                    <p className="text-[8px] text-slate-400 font-bold uppercase mb-1 text-center">Mente</p>
                                    <p className="text-sm font-bold text-amber-400 text-center">ON</p>
                                </div>
                                <div className="bg-white/5 p-2 rounded-xl backdrop-blur-sm">
                                    <p className="text-[8px] text-slate-400 font-bold uppercase mb-1 text-center">Treino</p>
                                    <p className="text-sm font-bold text-rose-400 text-center">{dailyData.exercicio.treinou ? 'OK' : '0%'}</p>
                                </div>
                            </div>
                        </div>
                        <div className="absolute top-[-20%] right-[-10%] w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl"></div>
                    </div>

                    <div className="grid gap-4">
                        <Card icon="droplet" color="#3b82f6" bgColor="bg-blue-50" title="Hidratação" subtitle={`${dailyData.agua}ml / ${dailyData.metaAgua}ml`} onClick={() => { setView('details'); setActiveTab('agua'); }} />
                        <Card icon="utensils" color="#10b981" bgColor="bg-emerald-50" title="Alimentação" subtitle={`${dailyData.refeicoes.filter(r => r.completed).length}/4 refeições`} onClick={() => { setView('details'); setActiveTab('comida'); }} />
                        <Card icon="dumbbell" color="#f43f5e" bgColor="bg-rose-50" title="Exercício Físico" subtitle={dailyData.exercicio.treinou ? `Treino de ${dailyData.exercicio.minutos}min feito!` : "Nenhum registro hoje"} onClick={() => { setView('details'); setActiveTab('exercicio'); }} />
                        <Card icon="brain" color="#f59e0b" bgColor="bg-amber-50" title="Mente & Foco" subtitle={`${dailyData.mente.minutos}min focados`} onClick={() => { setView('details'); setActiveTab('mente'); }} />
                    </div>

                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                        <div className="flex justify-between items-center">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Performance Semanal</h3>
                            <span className="text-[10px] font-bold bg-slate-100 text-slate-600 px-2 py-1 rounded-full">Últimos 7 dias</span>
                        </div>
                        <WeeklyChart data={dailyData.historico} />
                    </div>
                </div>
            );

            const Card = ({ icon, color, bgColor, title, subtitle, onClick }) => (
                <button onClick={onClick} className="w-full bg-white p-4 rounded-3xl flex items-center justify-between border border-slate-100 shadow-sm hover:shadow-md transition-all active:scale-[0.98]">
                    <div className="flex items-center gap-4 text-left">
                        <div className={`${bgColor} p-3 rounded-2xl`}>
                            <Icon name={icon} className="w-5 h-5" color={color} />
                        </div>
                        <div>
                            <h3 className="font-bold text-slate-800 text-sm">{title}</h3>
                            <p className="text-[10px] text-slate-400 font-medium uppercase tracking-tight">{subtitle}</p>
                        </div>
                    </div>
                    <Icon name="chevron-right" className="text-slate-300 w-4 h-4" />
                </button>
            );

            const DetailsView = () => (
                <div className="animate-fade-in space-y-6 pb-24 pt-4">
                    <button onClick={() => setView('home')} className="group flex items-center gap-2 text-slate-400 mb-2 px-3 py-2 hover:text-slate-800 transition-colors">
                        <Icon name="arrow-left" className="w-4 h-4" />
                        <span className="text-sm font-bold">Voltar ao painel</span>
                    </button>
                    
                    <div className="flex p-1 bg-slate-100 rounded-2xl overflow-x-auto no-scrollbar">
                        {['agua', 'comida', 'exercicio', 'mente'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`flex-shrink-0 px-4 py-2.5 text-[10px] font-black rounded-xl capitalize transition-all ${activeTab === t ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>
                                {t === 'agua' ? 'Água' : t === 'comida' ? 'Dieta' : t === 'exercicio' ? 'Treino' : 'Mente'}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'agua' && (
                        <div className="bg-white p-10 rounded-[40px] border border-slate-100 text-center shadow-sm space-y-6">
                            <div className="inline-flex items-center justify-center w-24 h-24 bg-blue-50 rounded-full">
                                <Icon name="droplet" className="w-10 h-10" color="#3b82f6" />
                            </div>
                            <h2 className="text-5xl font-black text-slate-900 tracking-tighter">{dailyData.agua}<span className="text-lg text-slate-300 ml-1 italic font-normal">ml</span></h2>
                            <div className="flex justify-center gap-4">
                                <button onClick={() => updateWater(-250)} className="w-14 h-14 rounded-2xl border border-slate-100 flex items-center justify-center font-black text-slate-300">-</button>
                                <button onClick={() => updateWater(250)} className="px-8 h-14 rounded-2xl bg-blue-600 text-white font-black shadow-lg shadow-blue-200">+ 250ml</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'comida' && (
                        <div className="space-y-4">
                            {dailyData.refeicoes.map(ref => (
                                <button key={ref.id} onClick={() => toggleRefeicao(ref.id)} className={`w-full flex items-center justify-between p-5 rounded-3xl border transition-all ${ref.completed ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 'bg-white border-slate-100'}`}>
                                    <div className="flex items-center gap-4">
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${ref.completed ? 'bg-emerald-200' : 'bg-slate-50'}`}>
                                             <Icon name="utensils" className="w-5 h-5" color={ref.completed ? "#047857" : "#cbd5e1"} />
                                        </div>
                                        <span className="font-bold">{ref.label}</span>
                                    </div>
                                    {ref.completed && <Icon name="check-circle-2" className="text-emerald-500 w-6 h-6" color="#10b981" />}
                                </button>
                            ))}
                        </div>
                    )}

                    {activeTab === 'exercicio' && (
                        <div className="space-y-6">
                            <div className="bg-white p-8 rounded-[40px] border border-slate-100 text-center space-y-6 shadow-sm">
                                <div className="inline-flex items-center justify-center w-20 h-20 bg-rose-50 rounded-3xl">
                                    <Icon name="dumbbell" className="w-10 h-10" color="#f43f5e" />
                                </div>
                                <div>
                                    <h3 className="font-black text-slate-800 uppercase text-xs tracking-widest mb-2">Duração do Treino</h3>
                                    <div className="text-5xl font-black text-rose-600 tracking-tighter">{dailyData.exercicio.minutos}<span className="text-lg text-rose-200 ml-1 font-normal">min</span></div>
                                </div>
                                <div className="flex justify-center gap-4">
                                    <button onClick={() => updateExercicio('minutos', Math.max(0, dailyData.exercicio.minutos - 10))} className="w-14 h-12 border border-slate-100 rounded-2xl font-black text-slate-300">-10</button>
                                    <button onClick={() => updateExercicio('minutos', dailyData.exercicio.minutos + 10)} className="w-14 h-12 bg-rose-500 text-white rounded-2xl font-black shadow-lg shadow-rose-100">+10</button>
                                </div>
                                <button 
                                    onClick={() => updateExercicio('treinou', !dailyData.exercicio.treinou)}
                                    className={`w-full py-4 rounded-2xl font-black transition-all ${dailyData.exercicio.treinou ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-100' : 'bg-slate-900 text-white'}`}
                                >
                                    {dailyData.exercicio.treinou ? 'TREINO CONCLUÍDO!' : 'MARCAR COMO FEITO'}
                                </button>
                            </div>
                            
                            <div className="grid grid-cols-3 gap-3">
                                {['Musculação', 'Cardio', 'Yoga'].map(tipo => (
                                    <button 
                                        key={tipo} 
                                        onClick={() => updateExercicio('tipo', tipo)}
                                        className={`py-3 rounded-2xl text-[10px] font-bold uppercase border transition-all ${dailyData.exercicio.tipo === tipo ? 'bg-rose-50 border-rose-200 text-rose-600' : 'bg-white border-slate-100 text-slate-400'}`}
                                    >
                                        {tipo}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'mente' && (
                        <div className="space-y-6">
                            <div className="bg-white p-8 rounded-[40px] border border-slate-100 text-center space-y-6 shadow-sm">
                                <div className="inline-flex items-center justify-center w-20 h-20 bg-amber-50 rounded-3xl">
                                    <Icon name="brain" className="w-10 h-10" color="#f59e0b" />
                                </div>
                                <div className="text-5xl font-black text-amber-600 tracking-tighter">{dailyData.mente.minutos}<span className="text-lg text-amber-200 ml-1 font-normal">min</span></div>
                                <div className="flex justify-center gap-4">
                                    <button onClick={() => updateMente('minutos', Math.max(0, dailyData.mente.minutos - 5))} className="w-14 h-12 border border-slate-100 rounded-2xl font-black text-slate-300">-5</button>
                                    <button onClick={() => updateMente('minutos', dailyData.mente.minutos + 5)} className="w-14 h-12 bg-amber-500 text-white rounded-2xl font-black shadow-lg shadow-amber-100">+5</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => updateMente('meditacao', !dailyData.mente.meditacao)} className={`p-6 rounded-[32px] border flex flex-col items-center gap-3 transition-all ${dailyData.mente.meditacao ? 'bg-amber-50 border-amber-200' : 'bg-white border-slate-100'}`}>
                                    <Icon name="sparkles" className="w-6 h-6" color={dailyData.mente.meditacao ? "#d97706" : "#cbd5e1"} />
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Meditação</span>
                                </button>
                                <button onClick={() => updateMente('leituras', !dailyData.mente.leituras)} className={`p-6 rounded-[32px] border flex flex-col items-center gap-3 transition-all ${dailyData.mente.leituras ? 'bg-amber-50 border-amber-200' : 'bg-white border-slate-100'}`}>
                                    <Icon name="book-open" className="w-6 h-6" color={dailyData.mente.leituras ? "#d97706" : "#cbd5e1"} />
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Leitura</span>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen p-5 bg-slate-50/50">
                    {view === 'home' ? <HomeView /> : <DetailsView />}
                    
                    <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 backdrop-blur-xl border-t p-5 flex justify-around rounded-t-[40px] shadow-[0_-10px_30px_rgba(0,0,0,0.03)] z-50">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1.5 transition-all ${view === 'home' ? 'text-indigo-600 scale-110' : 'text-slate-300'}`}>
                            <Icon name="zap" className="w-6 h-6" color={view === 'home' ? "#4f46e5" : "#cbd5e1"} />
                            <span className="text-[9px] font-black tracking-widest uppercase">Home</span>
                        </button>
                        <button onClick={() => { setView('details'); setActiveTab('agua'); }} className={`flex flex-col items-center gap-1.5 transition-all ${view === 'details' ? 'text-indigo-600 scale-110' : 'text-slate-300'}`}>
                            <Icon name="target" className="w-6 h-6" color={view === 'details' ? "#4f46e5" : "#cbd5e1"} />
                            <span className="text-[9px] font-black tracking-widest uppercase">Metas</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
